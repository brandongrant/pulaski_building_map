<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening PulaskiDeeds</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: #05060a; color: #e8eaf0;
    font: 14px/1.5 "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  main {
    width: min(460px, calc(100vw - 32px));
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(13, 16, 24, 0.94);
    border-radius: 10px; padding: 22px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
  }
  h1 { margin: 0 0 8px; font-size: 18px; }
  p { margin: 0 0 12px; color: #b8c0d2; }
  a { color: #f3d54c; }
  button {
    border: 1px solid rgba(243, 213, 76, 0.45);
    background: #f3d54c; color: #101217;
    border-radius: 6px; padding: 9px 12px;
    font: 600 13px/1 "Segoe UI", system-ui, -apple-system, sans-serif;
    cursor: pointer;
  }
  button:disabled { cursor: wait; opacity: 0.65; }
</style>
</head>
<body>
<main>
  <h1>Opening PulaskiDeeds</h1>
  <p id="status">Ready to open the county record.</p>
  <p id="detail"></p>
  <p><button id="openBtn" type="button">Open records</button></p>
  <p>If the popup is blocked, <a id="fallback" href="https://pulaskideeds.com/search/index.php?Accept=Accept">open PulaskiDeeds search</a>.</p>
</main>
<script>
"use strict";

const BASE = "https://pulaskideeds.com/search/";
// index.php honors Accept via GET — lands past the legal disclaimer with an
// accepted session in one top-level GET (see openPulaskiDeed in app.js).
const ACCEPT_URL = `${BASE}index.php?Accept=Accept`;
const params = new URLSearchParams(window.location.search);
const statusEl = document.getElementById("status");
const detailEl = document.getElementById("detail");
const fallback = document.getElementById("fallback");
const openBtn = document.getElementById("openBtn");
const INST_CODES = [
  "ALA", "AMU", "ARM", "ARS", "ASM", "ASR", "AST", "ASU", "BAS", "BFD",
  "CAD", "CCL", "CNU", "COD", "COM", "CRC", "CRD", "CRF", "CSR", "CTY",
  "CVJ", "DCH", "DTM", "EAD", "EXD", "FJL", "FTL", "INT", "IRD", "IRL",
  "IRM", "IRT", "LPL", "LTD", "MAD", "MEL", "MGM", "MID", "MML", "MRB",
  "NJA", "NJC", "NJD", "NJF", "NJL", "NJP", "NJS", "NOB", "NOL", "OAO",
  "ORS", "ORU", "OTB", "OTC", "OTD", "OTI", "OTJ", "OTL", "OUF", "PAG",
  "PLAT", "POA", "PRL", "PRM", "PRR", "PRU", "PSJ", "QCD", "RAR", "RBA",
  "RDD", "REL", "REM", "REU", "RML", "RPA", "RTL", "SAJ", "SALE", "SML",
  "SUM", "SUS", "SUT", "SUU", "TEU", "TMU", "UCC", "WAD",
];

function contentURL() {
  return `${BASE}content.php?embedded=1&${Date.now()}`;
}

function postWindow(target, fields) {
  const form = document.createElement("form");
  form.method = "post";
  form.action = `${BASE}ajaxActions.php`;
  form.target = target;
  form.hidden = true;
  for (const [name, value] of Object.entries(fields)) {
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = name;
    input.value = value;
    form.appendChild(input);
  }
  document.body.appendChild(form);
  form.submit();
  window.setTimeout(() => form.remove(), 2500);
}

function instValue() {
  return String(params.get("inst") || "").replace(/[^0-9A-Za-z-]/g, "");
}

function ownerValue() {
  return String(params.get("owner") || "").trim();
}

function todayMDY() {
  const d = new Date();
  return `${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")}/${d.getFullYear()}`;
}

function ownerCandidates(owner) {
  const raw = String(owner || "").split(/[\/;]+/);
  const out = [];
  for (const part of raw) {
    const clean = part.replace(/\s+/g, " ").trim();
    if (clean && !out.some((v) => v.toUpperCase() === clean.toUpperCase())) out.push(clean);
  }
  return out.length ? out : [String(owner || "").trim()].filter(Boolean);
}

function ownerEntityId(owner) {
  const clean = owner.toUpperCase().replace(/[^A-Z0-9]+/g, "_").replace(/^_+|_+$/g, "");
  return clean ? clean + ":" : "";
}

function ownerEntityValue(owner) {
  return owner.toUpperCase().replace(/[^A-Z0-9]+/g, "");
}

function targetName(kind) {
  return `pulaski_${kind}_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
}

function ownerDataString(names) {
  const primary = names[names.length - 1];
  const data = new URLSearchParams();
  data.set("searchType", "name");
  data.set("start_date", "01/01/1903");
  data.set("end_date", todayMDY());
  data.set("sort_type", "Name");
  data.set("search_type", "Standard");
  data.set("last_name", primary.toLowerCase());
  data.set("party_type", "Both");
  data.set("entity_type", "Both");
  data.set("instType[ALL][ALL]", "ALL");
  for (const code of INST_CODES) data.set(`instType[${code}][${code}]`, code);
  data.set("plresults_length", "100");
  for (const name of names) data.append("name[]", ownerEntityValue(name));
  return data.toString();
}

function openInstrument(inst) {
  const target = targetName("inst");
  // Two top-level GETs: accept the disclaimer, then request the record —
  // content.php takes the details params in the query string. GETs always
  // carry the session cookie under SameSite=Lax, unlike cross-site POSTs.
  const w = window.open(ACCEPT_URL, target);
  if (!w) return false;
  statusEl.textContent = `Opening instrument ${inst}...`;
  window.setTimeout(() => {
    try {
      w.location.href = `${BASE}content.php?searchType=details&inst_num=${encodeURIComponent(inst)}`;
      w.focus();
    } catch (e) {}
  }, 5500);
  return true;
}

function openOwner(owner) {
  const names = ownerCandidates(owner);
  const dataString = ownerDataString(names);
  const target = targetName("owner");
  // Start on the accept URL so the session is past the disclaimer before the
  // storeEID/storeDataString POSTs — un-accepted sessions get rejected.
  const w = window.open(ACCEPT_URL, target);
  if (!w) return false;
  statusEl.textContent = `Opening records for ${names.join(" / ")}...`;
  names.forEach((name, i) => {
    window.setTimeout(() => {
      postWindow(target, { entityID: ownerEntityId(name), action: "storeEID" });
    }, 1100 + (i * 900));
  });
  window.setTimeout(() => {
    postWindow(target, { dataString, action: "storeDataString" });
  }, 1100 + (names.length * 900));
  window.setTimeout(() => {
    try {
      w.location.href = contentURL();
      w.focus();
    } catch (e) {}
  }, 11000 + (names.length * 1200));
  return true;
}

function describeRequest() {
  const inst = instValue();
  const owner = ownerValue();
  if (inst) {
    detailEl.textContent = `Instrument ${inst}`;
    return true;
  } else if (owner && ownerEntityId(owner)) {
    detailEl.textContent = `Owner ${ownerCandidates(owner).join(" / ")}`;
    return true;
  }
  statusEl.textContent = "No PulaskiDeeds record was provided.";
  openBtn.disabled = true;
  return false;
}

openBtn.addEventListener("click", () => {
  const inst = instValue();
  const owner = ownerValue();
  openBtn.disabled = true;
  let ok = false;
  if (inst) ok = openInstrument(inst);
  else if (owner && ownerEntityId(owner)) ok = openOwner(owner);
  if (!ok) {
    statusEl.textContent = "PulaskiDeeds popup was blocked.";
    openBtn.disabled = false;
  }
});

describeRequest();
</script>
</body>
</html>
