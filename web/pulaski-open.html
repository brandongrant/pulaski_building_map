<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening PulaskiDeeds</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: #05060a; color: #e8eaf0;
    font: 14px/1.5 "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  main {
    width: min(460px, calc(100vw - 32px));
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(13, 16, 24, 0.94);
    border-radius: 10px; padding: 22px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
  }
  h1 { margin: 0 0 8px; font-size: 18px; }
  p { margin: 0 0 12px; color: #b8c0d2; }
  a { color: #f3d54c; }
  iframe { position: fixed; width: 1px; height: 1px; left: -10px; top: -10px; opacity: 0; }
</style>
</head>
<body>
<main>
  <h1>Opening PulaskiDeeds</h1>
  <p id="status">Preparing the county record...</p>
  <p>If this tab does not move in a few seconds, <a id="fallback" href="https://pulaskideeds.com/search/">open PulaskiDeeds search</a>.</p>
</main>
<iframe id="pulaskiFrame" name="pulaskiFrame" title="PulaskiDeeds session initializer"></iframe>
<script>
"use strict";

const BASE = "https://pulaskideeds.com/search/";
const WAIT = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));
const params = new URLSearchParams(window.location.search);
const frame = document.getElementById("pulaskiFrame");
const statusEl = document.getElementById("status");
const fallback = document.getElementById("fallback");
const INST_CODES = [
  "ALA", "AMU", "ARM", "ARS", "ASM", "ASR", "AST", "ASU", "BAS", "BFD",
  "CAD", "CCL", "CNU", "COD", "COM", "CRC", "CRD", "CRF", "CSR", "CTY",
  "CVJ", "DCH", "DTM", "EAD", "EXD", "FJL", "FTL", "INT", "IRD", "IRL",
  "IRM", "IRT", "LPL", "LTD", "MAD", "MEL", "MGM", "MID", "MML", "MRB",
  "NJA", "NJC", "NJD", "NJF", "NJL", "NJP", "NJS", "NOB", "NOL", "OAO",
  "ORS", "ORU", "OTB", "OTC", "OTD", "OTI", "OTJ", "OTL", "OUF", "PAG",
  "PLAT", "POA", "PRL", "PRM", "PRR", "PRU", "PSJ", "QCD", "RAR", "RBA",
  "RDD", "REL", "REM", "REU", "RML", "RPA", "RTL", "SAJ", "SALE", "SML",
  "SUM", "SUS", "SUT", "SUU", "TEU", "TMU", "UCC", "WAD",
];

function setFrame(url) {
  frame.src = url;
}

function postFrame(fields) {
  const form = document.createElement("form");
  form.method = "post";
  form.action = `${BASE}ajaxActions.php`;
  form.target = "pulaskiFrame";
  form.hidden = true;
  for (const [name, value] of Object.entries(fields)) {
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = name;
    input.value = value;
    form.appendChild(input);
  }
  document.body.appendChild(form);
  form.submit();
  window.setTimeout(() => form.remove(), 1200);
}

function contentURL() {
  return `${BASE}content.php?embedded=1&${Date.now()}`;
}

function instValue() {
  return String(params.get("inst") || "").replace(/[^0-9A-Za-z-]/g, "");
}

function ownerValue() {
  return String(params.get("owner") || "").trim();
}

function todayMDY() {
  const d = new Date();
  return `${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")}/${d.getFullYear()}`;
}

function ownerCandidates(owner) {
  const raw = String(owner || "").split(/[\/;]+/);
  const out = [];
  for (const part of raw) {
    const clean = part.replace(/\s+/g, " ").trim();
    if (clean && !out.some((v) => v.toUpperCase() === clean.toUpperCase())) out.push(clean);
  }
  return out.length ? out : [String(owner || "").trim()].filter(Boolean);
}

function ownerEntityId(owner) {
  const clean = owner.toUpperCase().replace(/[^A-Z0-9]+/g, "_").replace(/^_+|_+$/g, "");
  return clean ? clean + ":" : "";
}

function ownerEntityValue(owner) {
  return owner.toUpperCase().replace(/[^A-Z0-9]+/g, "");
}

async function openInstrument(inst) {
  const data = new URLSearchParams({ searchType: "details", inst_num: inst });
  fallback.href = `${BASE}index.php`;
  statusEl.textContent = `Opening instrument ${inst}...`;
  setFrame(`${BASE}index.php`);
  await WAIT(900);
  postFrame({ dataString: data.toString(), action: "storeDataString" });
  await WAIT(900);
  window.location.href = contentURL();
}

async function openOwner(owner) {
  const names = ownerCandidates(owner);
  const primary = names[names.length - 1];
  const data = new URLSearchParams();
  data.set("searchType", "name");
  data.set("start_date", "01/01/1903");
  data.set("end_date", todayMDY());
  data.set("sort_type", "Name");
  data.set("search_type", "Standard");
  data.set("last_name", primary.toLowerCase());
  data.set("party_type", "Both");
  data.set("entity_type", "Both");
  data.set("instType[ALL][ALL]", "ALL");
  for (const code of INST_CODES) data.set(`instType[${code}][${code}]`, code);
  data.set("plresults_length", "100");
  for (const name of names) data.append("name[]", ownerEntityValue(name));
  fallback.href = `${BASE}index.php`;
  statusEl.textContent = `Opening records for ${names.join(" / ")}...`;
  setFrame(`${BASE}index.php`);
  await WAIT(900);
  for (const name of names) {
    postFrame({ entityID: ownerEntityId(name), action: "storeEID" });
    await WAIT(350);
  }
  postFrame({ dataString: data.toString(), action: "storeDataString" });
  await WAIT(900);
  window.location.href = contentURL();
}

(async () => {
  const inst = instValue();
  const owner = ownerValue();
  if (inst) {
    await openInstrument(inst);
  } else if (owner && ownerEntityId(owner)) {
    await openOwner(owner);
  } else {
    statusEl.textContent = "No PulaskiDeeds record was provided.";
  }
})().catch(() => {
  statusEl.textContent = "PulaskiDeeds did not accept the automatic opener.";
});
</script>
</body>
</html>
