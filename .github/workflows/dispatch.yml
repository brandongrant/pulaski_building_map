name: Collect dispatch + deeds data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dispatch-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          ref: data
          path: datastore
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python pipeline/dispatch_collect.py --store datastore
      - name: Collect recorded documents (pulaskideeds.com, 2 gentle queries)
        continue-on-error: true
        run: python pipeline/deeds_collect.py --store datastore --max-queries 2
      - name: Commit collected data
        run: |
          cd datastore
          git config user.name "dispatch-collector"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no new data"
          else
            git commit -m "collect: $(date -u +%FT%TZ)"
            for i in 1 2 3; do
              git push && break || { git pull --rebase; sleep 5; }
            done
          fi
